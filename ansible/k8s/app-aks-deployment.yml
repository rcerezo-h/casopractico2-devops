apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-aks
  labels:
    app: app-aks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-aks
  template:
    metadata:
      labels:
        app: app-aks
    spec:
      containers:
        - name: app-aks
          image: acrxzvy46px.azurecr.io/app-aks:casopractico2
          ports:
            - containerPort: 80
